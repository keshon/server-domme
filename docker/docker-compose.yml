services:
  app:
    container_name: ${ALIAS}
    restart: always
    image: '${ALIAS}-image'
    volumes:
      - ./data:/usr/project/data
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_GUILD_BLACKLIST=${DISCORD_GUILD_BLACKLIST}
      - STORAGE_PATH=${STORAGE_PATH:-/usr/project/data/datastore.json}
      - INIT_SLASH_COMMANDS=${INIT_SLASH_COMMANDS}
      - DEVELOPER_ID=${DEVELOPER_ID}
      - VOICE_READY_DELAY_MS=${VOICE_READY_DELAY_MS:-500}
      - WS_SILENCE_TIMEOUT=${WS_SILENCE_TIMEOUT:-2m}
      - DISCORD_UNHEALTHY_MODE=${DISCORD_UNHEALTHY_MODE:-restart-session}
      - DISCORD_UNHEALTHY_GRACE=${DISCORD_UNHEALTHY_GRACE:-0}
      - DISCORD_UNHEALTHY_WINDOW=${DISCORD_UNHEALTHY_WINDOW:-1m}
      - PLAYER_TRANSPORT_RECOVERY_MODE=${PLAYER_TRANSPORT_RECOVERY_MODE:-hard}
      - PLAYER_TRANSPORT_SOFT_ATTEMPTS=${PLAYER_TRANSPORT_SOFT_ATTEMPTS:-1}
      - COMMAND_TIMEOUT=${COMMAND_TIMEOUT:-30s}
      - COMMAND_PARALLELISM=${COMMAND_PARALLELISM:-16}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_MAX_SIZE_MB=${LOG_MAX_SIZE_MB:-10}
      - LOG_MAX_BACKUPS=${LOG_MAX_BACKUPS:-3}
      - LOG_MAX_AGE_DAYS=${LOG_MAX_AGE_DAYS:-0}
      - LOG_COMPRESS=${LOG_COMPRESS:-false}
      - TASKS_PATH=${TASKS_PATH}
      - PROTECTED_USERS=${PROTECTED_USERS}
      - SHORTLINK_BASE_URL=${SHORTLINK_BASE_URL}
    entrypoint: /usr/project/app
    networks:
      - proxy
    ports:
      - 8787
    labels:
      # HTTP to HTTPS redirection and middleware assignment
      - traefik.enable=true
      - traefik.http.routers.${ALIAS}-http.entrypoints=http
      - traefik.http.routers.${ALIAS}-http.rule=Host(`${HOST}`)
      - traefik.http.routers.${ALIAS}-http.middlewares=${ALIAS}-to-https,${ALIAS}-headers

      # HTTPS routing and TLS configuration
      - traefik.http.routers.${ALIAS}.entrypoints=https
      - traefik.http.routers.${ALIAS}.rule=Host(`${HOST}`)
      - traefik.http.routers.${ALIAS}.tls=true
      - traefik.http.routers.${ALIAS}.tls.certresolver=letsencrypt

      # Middleware for redirecting HTTP to HTTPS
      - traefik.http.middlewares.${ALIAS}-to-https.redirectscheme.scheme=https

networks:
  proxy:
    external: true      